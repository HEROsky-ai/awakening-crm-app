{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>✏️ 編輯聯絡人</h1>
</div>

<div class="card" style="max-width:500px;">
    <form method="post">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" name="name" class="form-control" value="{{ contact.name }}" required>
        </div>
        <div class="form-group">
            <label>來源</label>
            <select name="source" class="form-control">
                <option value="">選擇來源</option>
                {% for s in ['IG','LINE','活動','轉介紹','老朋友','其他'] %}
                <option value="{{ s }}" {% if contact.source == s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>標籤（用逗號分隔）</label>
            <input type="text" name="tags" class="form-control" value="{{ tags_str }}">
        </div>
        <div class="form-group">
            <label>備註</label>
            <textarea name="notes" class="form-control">{{ contact.notes }}</textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">儲存</button>
            <a href="{{ url_for('view_contact', contact_id=contact.id) }}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
