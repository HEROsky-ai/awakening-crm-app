{% extends "base.html" %}
{% block title %}新增新人訊息檔案 - 覺醒行動app{% endblock %}
{% block extra_css %}
<style>
    .add-container {
        max-width: 600px;
        margin: 0 auto;
    }
</style>
{% endblock %}

{% block content %}
<div class="add-container">
    <div class="page-header">
        <h1>➕ 新增新人訊息檔案</h1>
        <p class="text-muted">手動建立新人基本與 FORMDH 檔案</p>
    </div>
    
    <div class="card p-4">
        <form method="post" action="{{ url_for('add_contact') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label font-weight-bold">姓名 *</label>
                <input type="text" name="name" class="form-control" required placeholder="請輸入新人姓名或暱稱">
            </div>
            
            <div class="mb-3">
                <label class="form-label font-weight-bold">來源</label>
                <select name="source" class="form-control">
                    <option value="">選擇來源</option>
                    <option value="IG">IG</option>
                    <option value="LINE">LINE</option>
                    <option value="活動">活動認識</option>
                    <option value="轉介紹">轉介紹</option>
                    <option value="老朋友">老朋友</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label font-weight-bold">來源 App</label>
                <input type="text" name="from_app" list="app-options" class="form-control" placeholder="例如：LINE, Instagram, WeChat 等">
                <datalist id="app-options">
                    <option value="LINE"></option>
                    <option value="Instagram"></option>
                    <option value="WeChat"></option>
                    <option value="Facebook Messenger"></option>
                    <option value="WhatsApp"></option>
                    <option value="Threads"></option>
                </datalist>
            </div>

            <div class="mb-3">
                <label class="form-label font-weight-bold">上傳頭像/圖片</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            
            <div class="mb-3">
                <label class="form-label font-weight-bold">名單分類 (A / B / C 類)</label>
                <select name="category" class="form-control">
                    <option value="">無分類</option>
                    <option value="A">A 類 (知道安麗，態度好肯學習肯改變，晚上有時間出來學習7：30-9：30)</option>
                    <option value="B">B 類 (還不知安麗，時間有但需要溝通，才願意出來 想改變學習)</option>
                    <option value="C">C 類 (不論知不知道安麗，時間非常不固定，態度差，不想改，負面偏多等)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label font-weight-bold">標籤 (以英文逗號分隔，例如：新人, 高潛力)</label>
                <input type="text" name="tags" class="form-control" placeholder="新人, 高潛力">
                <small class="text-muted mt-1 d-block">預設標籤：新人、舊人、高潛力、待追蹤、已成交</small>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="fas fa-user-plus"></i> 建立新人檔案並填寫 FORMDH
            </button>
        </form>
    </div>
</div>
{% endblock %}
